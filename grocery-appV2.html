<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ledger — Grocery Route Planner</title>
<style>
  :root{
    --paper:#FBFAF4;
    --paper-dim:#F3F0E6;
    --ink:#20261F;
    --ink-soft:#5B6156;
    --green:#3B5D42;
    --green-dark:#233A29;
    --green-tint:#E4EBE1;
    --red:#B5432B;
    --red-tint:#F3E1DB;
    --tan:#E7E0CC;
    --line:#D9D3BE;
    --shadow: 0 2px 10px rgba(32,38,31,0.08);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper-dim);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;}
  #app{
    max-width:520px;
    margin:0 auto;
    min-height:100vh;
    background:var(--paper);
    display:flex;
    flex-direction:column;
    position:relative;
    box-shadow:var(--shadow);
  }
  header.topbar{
    padding:22px 54px 16px 20px;
    border-bottom:2px solid var(--ink);
    background:var(--paper);
    position:sticky;
    top:0;
    z-index:20;
  }
  header.topbar h1{
    font-family:Georgia,"Iowan Old Style",serif;
    font-size:22px;
    letter-spacing:2.5px;
    margin:0;
    text-transform:uppercase;
  }
  header.topbar .sub{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-top:3px;
    font-family:"SF Mono",Menlo,monospace;
  }
  .menuBtn{
    position:absolute;
    top:20px; right:16px;
    width:34px;height:34px;
    border-radius:8px;
    border:1.5px solid var(--ink);
    background:var(--paper);
    color:var(--ink);
    font-size:17px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .menuBtn:active{background:var(--tan);}
  .menuDropdown{
    position:absolute;
    top:58px; right:16px;
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:10px;
    box-shadow:var(--shadow);
    overflow:hidden;
    z-index:40;
    min-width:220px;
  }
  .menuItem{
    display:block;
    width:100%;
    text-align:left;
    background:none;
    border:none;
    padding:12px 14px;
    font-size:13.5px;
    color:var(--ink);
    cursor:pointer;
    font-family:inherit;
    border-bottom:1px solid var(--line);
  }
  .menuItem:last-child{border-bottom:none;}
  .menuItem:active{background:var(--paper-dim);}
  main{
    flex:1;
    padding:16px 16px 90px;
    overflow-y:auto;
  }
  nav.tabbar{
    position:sticky;
    bottom:0;
    display:flex;
    background:var(--ink);
    border-top:2px solid var(--ink);
    z-index:20;
  }
  nav.tabbar button{
    flex:1;
    background:none;
    border:none;
    color:#B9C0B4;
    padding:11px 4px 9px;
    font-size:10.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    font-family:"SF Mono",Menlo,monospace;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:3px;
    position:relative;
  }
  nav.tabbar button .icon{font-size:18px;}
  nav.tabbar button.active{color:#fff;}
  nav.tabbar button.active::before{
    content:"";
    position:absolute;
    top:0;left:20%;right:20%;
    height:2px;
    background:#fff;
  }
  .badge{
    position:absolute;
    top:2px; right:22%;
    background:var(--red);
    color:#fff;
    font-size:9px;
    min-width:15px;
    height:15px;
    border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    padding:0 3px;
  }
  h2.viewtitle{
    font-family:Georgia,serif;
    font-size:19px;
    margin:4px 0 14px;
    letter-spacing:0.3px;
  }
  .eyebrow{
    font-family:"SF Mono",Menlo,monospace;
    font-size:10.5px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:4px;
  }
  input[type=text],input[type=search],select{
    width:100%;
    padding:10px 12px;
    border:1.5px solid var(--line);
    border-radius:8px;
    background:#fff;
    font-size:14.5px;
    color:var(--ink);
    font-family:inherit;
  }
  input:focus,select:focus{outline:2px solid var(--green);outline-offset:1px;}
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    padding:10px 16px;
    border-radius:8px;
    border:1.5px solid var(--ink);
    background:var(--ink);
    color:#fff;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
    font-family:inherit;
  }
  .btn.secondary{background:transparent;color:var(--ink);}
  .btn.green{background:var(--green);border-color:var(--green);}
  .btn.red{background:var(--red);border-color:var(--red);}
  .btn.ghost{background:transparent;border-color:var(--line);color:var(--ink-soft);}
  .btn.block{width:100%;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn.small{padding:6px 10px;font-size:12px;border-radius:6px;}
  .row{display:flex;gap:8px;align-items:center;}
  .row.between{justify-content:space-between;}
  .card{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:10px;
    padding:13px 14px;
    margin-bottom:10px;
  }
  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-soft);
  }
  .empty .big{font-size:34px;margin-bottom:10px;}
  .empty p{font-size:13.5px;line-height:1.5;margin:4px 0 16px;}
  .prod-row{
    display:flex;align-items:center;gap:10px;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .prod-row:last-child{border-bottom:none;}
  .prod-name{font-size:14.5px;font-weight:500;}
  .prod-meta{font-size:11px;color:var(--ink-soft);font-family:"SF Mono",Menlo,monospace;margin-top:2px;}
  .chip{
    display:inline-block;
    font-size:10.5px;
    padding:2px 7px;
    border-radius:5px;
    background:var(--tan);
    color:var(--ink-soft);
    font-family:"SF Mono",Menlo,monospace;
  }
  .checkbox{
    width:22px;height:22px;
    border:2px solid var(--ink);
    border-radius:6px;
    flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    background:#fff;
  }
  .checkbox.checked{background:var(--green);border-color:var(--green);color:#fff;}
  .checkbox.checked.bought{background:var(--ink-soft);border-color:var(--ink-soft);}
  .section-label{
    font-family:"SF Mono",Menlo,monospace;
    font-size:11px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:#fff;
    background:var(--green);
    padding:6px 10px;
    border-radius:6px 6px 0 0;
    margin-top:16px;
  }
  .section-body{
    border:1.5px solid var(--line);
    border-top:none;
    border-radius:0 0 10px 10px;
    background:#fff;
    padding:0 10px;
  }
  .section-label.unsorted{background:var(--ink-soft);}
  .modal-bg{
    position:fixed;inset:0;
    background:rgba(32,38,31,0.5);
    display:flex;align-items:flex-end;justify-content:center;
    z-index:100;
  }
  .modal{
    background:var(--paper);
    width:100%;max-width:520px;
    border-radius:16px 16px 0 0;
    padding:20px 20px 26px;
    max-height:88vh;
    overflow-y:auto;
  }
  .modal h3{font-family:Georgia,serif;font-size:18px;margin:0 0 14px;}
  .field{margin-bottom:12px;}
  .field label{font-size:11.5px;color:var(--ink-soft);display:block;margin-bottom:5px;font-family:"SF Mono",Menlo,monospace;letter-spacing:0.5px;text-transform:uppercase;}
  .store-card{
    background:#fff;border:1.5px solid var(--line);border-radius:10px;
    padding:14px;margin-bottom:10px;cursor:pointer;
  }
  .store-card h4{margin:0 0 3px;font-size:15.5px;font-family:Georgia,serif;}
  .aisle-item{
    display:flex;align-items:center;gap:8px;
    background:#fff;border:1.5px solid var(--line);border-radius:8px;
    padding:9px 10px;margin-bottom:7px;
  }
  .aisle-num{
    font-family:"SF Mono",Menlo,monospace;
    font-size:11px;color:#fff;background:var(--green);
    width:22px;height:22px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .arrowbtn{
    background:var(--paper-dim);border:1px solid var(--line);
    width:26px;height:26px;border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:12px;
  }
  .receipt{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:10px;
    position:relative;
    padding-bottom:8px;
    margin-bottom:14px;
  }
  .receipt::after{
    content:"";
    display:block;
    height:9px;
    margin-top:4px;
    background-image: linear-gradient(135deg, var(--paper) 50%, transparent 50%), linear-gradient(45deg, var(--paper) 50%, transparent 50%);
    background-size: 12px 12px;
    background-position: bottom;
  }
  .receipt-head{
    padding:14px 16px 8px;
    text-align:center;
    border-bottom:1px dashed var(--line);
  }
  .receipt-head .store{font-family:Georgia,serif;font-size:16px;}
  .receipt-head .meta{font-size:10.5px;color:var(--ink-soft);font-family:"SF Mono",Menlo,monospace;margin-top:2px;}
  .stamp{
    display:inline-block;
    border:2px solid var(--red);
    color:var(--red);
    font-family:"SF Mono",Menlo,monospace;
    font-size:9.5px;
    letter-spacing:1px;
    padding:1px 5px;
    border-radius:4px;
    transform:rotate(-6deg);
    margin-left:6px;
  }
  .search-wrap{position:relative;margin-bottom:12px;}
  .toast{
    position:fixed;
    bottom:76px;left:50%;transform:translateX(-50%);
    background:var(--ink);color:#fff;
    padding:9px 18px;border-radius:20px;
    font-size:12.5px;
    z-index:200;
    box-shadow:var(--shadow);
  }
  #scanBox video{width:100%;border-radius:8px;background:#000;}
  ::placeholder{color:#B7B2A0;}
  a{color:var(--green);}
  .link-btn{background:none;border:none;color:var(--green);font-size:13px;cursor:pointer;padding:0;font-family:inherit;text-decoration:underline;margin-bottom:8px;display:inline-block;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <h1>Ledger</h1>
    <div class="sub" id="topSub">your grocery memory</div>
    <button class="menuBtn" id="menuBtn" aria-label="Menu">⚙</button>
    <div class="menuDropdown" id="menuDropdown" style="display:none;">
      <button class="menuItem" id="menuStoresBtn">🏬 Supermarkets & aisles</button>
    </div>
  </header>
  <main id="view"></main>
  <nav class="tabbar">
    <button data-view="library"><span class="icon">📚</span>Library</button>
    <button data-view="kart"><span class="icon">🛒</span>Kart<span class="badge" id="kartBadge" style="display:none"></span></button>
  </nav>
</div>
<div id="modalRoot"></div>
<div id="toastRoot"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
(function(){
"use strict";

/* ---------- storage shim ---------- */
const memStore = {};
const storage = (window.storage && typeof window.storage.get === 'function') ? window.storage : {
  async get(k){ return (k in memStore)? {key:k, value:memStore[k]} : null; },
  async set(k,v){ memStore[k]=v; return {key:k,value:v}; },
  async delete(k){ delete memStore[k]; return {key:k,deleted:true}; }
};

async function loadJSON(key, fallback){
  try{
    const r = await storage.get(key,false);
    if(!r) return fallback;
    return JSON.parse(r.value);
  }catch(e){ return fallback; }
}
async function saveJSON(key, val){
  try{ await storage.set(key, JSON.stringify(val), false); }catch(e){ console.error('save failed', key, e); }
}

/* ---------- state ---------- */
let state = {
  products: [],
  supermarkets: [],
  aisleMap: {},
  cart: null,
  currentView: 'library',
  previousView: 'library',
  currentStoreId: null,
  planStoreId: null,
  search: ''
};

function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }
function todayStr(){ return new Date().toLocaleDateString(undefined,{month:'short',day:'numeric'}); }

async function persistAll(){
  await Promise.all([
    saveJSON('products', state.products),
    saveJSON('supermarkets', state.supermarkets),
    saveJSON('aisleMap', state.aisleMap),
    saveJSON('cart', state.cart)
  ]);
}

async function init(){
  state.products = await loadJSON('products', []);
  state.supermarkets = await loadJSON('supermarkets', []);
  state.aisleMap = await loadJSON('aisleMap', {});
  state.cart = await loadJSON('cart', null);
  if(state.cart) state.planStoreId = state.cart.supermarketId;
  bindNav();
  render();
}

function bindNav(){
  document.querySelectorAll('nav.tabbar button').forEach(b=>{
    b.addEventListener('click', ()=>{
      state.currentView = b.dataset.view;
      closeMenu();
      render();
    });
  });
  document.getElementById('menuBtn').addEventListener('click', (e)=>{
    e.stopPropagation();
    const dd = document.getElementById('menuDropdown');
    dd.style.display = dd.style.display==='none' ? 'block' : 'none';
  });
  document.getElementById('menuStoresBtn').addEventListener('click', ()=>{
    openStoresMenu();
  });
  document.addEventListener('click', (e)=>{
    const dd = document.getElementById('menuDropdown');
    if(dd.style.display==='block' && !dd.contains(e.target) && e.target.id!=='menuBtn'){
      dd.style.display='none';
    }
  });
}

function closeMenu(){
  const dd = document.getElementById('menuDropdown');
  if(dd) dd.style.display='none';
}

function openStoresMenu(){
  if(state.currentView!=='stores') state.previousView = state.currentView;
  state.currentView = 'stores';
  closeMenu();
  render();
}

function toast(msg){
  const el = document.createElement('div');
  el.className='toast';
  el.textContent=msg;
  document.getElementById('toastRoot').appendChild(el);
  setTimeout(()=>el.remove(), 1900);
}

function getAisleForProduct(storeId, productId){
  return (state.aisleMap[storeId] && state.aisleMap[storeId][productId]) || null;
}
function setAisleForProduct(storeId, productId, aisleId){
  if(!state.aisleMap[storeId]) state.aisleMap[storeId] = {};
  if(aisleId) state.aisleMap[storeId][productId] = aisleId;
  else delete state.aisleMap[storeId][productId];
}
function storeById(id){ return state.supermarkets.find(s=>s.id===id); }
function productById(id){ return state.products.find(p=>p.id===id); }

function groupByAisle(storeId, productIds){
  const store = storeById(storeId);
  const groups = [];
  if(store){
    store.aisles.forEach(a=>{
      const ids = productIds.filter(pid => getAisleForProduct(storeId,pid)===a.id);
      if(ids.length) groups.push({label:a.name, ids});
    });
  }
  const unsortedIds = productIds.filter(pid => !store || !getAisleForProduct(storeId,pid) || !store.aisles.find(a=>a.id===getAisleForProduct(storeId,pid)));
  if(unsortedIds.length) groups.push({label:'Unsorted', ids:unsortedIds, unsorted:true});
  return groups;
}

function cartCount(){ return state.cart ? state.cart.items.length : 0; }

function render(){
  document.querySelectorAll('nav.tabbar button').forEach(b=>{
    b.classList.toggle('active', b.dataset.view===state.currentView);
  });
  const badge = document.getElementById('kartBadge');
  const c = cartCount();
  badge.style.display = c>0 ? 'flex':'none';
  badge.textContent = c;
  document.getElementById('topSub').textContent =
    state.currentView==='library' ? 'product library' :
    state.currentView==='stores' ? 'supermarkets & routes' :
    (state.cart && state.cart.locked) ? 'shopping now' : "build this week's kart";

  const view = document.getElementById('view');
  if(state.currentView==='library') view.innerHTML = renderLibrary();
  else if(state.currentView==='stores') view.innerHTML = state.currentStoreId ? renderStoreDetail() : renderStores();
  else if(state.currentView==='kart') view.innerHTML = renderKartTab();
  attachViewHandlers();
}

function renderLibrary(){
  const q = state.search.trim().toLowerCase();
  const items = state.products
    .filter(p => !q || p.name.toLowerCase().includes(q) || (p.barcode||'').includes(q))
    .sort((a,b)=>a.name.localeCompare(b.name));

  if(state.products.length===0){
    return `
    <h2 class="viewtitle">Library</h2>
    <div class="empty">
      <div class="big">🗂️</div>
      <p>Nothing in your library yet. Add every product you buy every once in a while — this becomes the memory you check against each week.</p>
      <button class="btn green" id="addProductBtn">+ Add a product</button>
    </div>`;
  }

  return `
  <h2 class="viewtitle">Library <span class="chip">${state.products.length}</span></h2>
  <div class="search-wrap">
    <input type="search" id="librarySearch" placeholder="Search products or barcode…" value="${escapeAttr(state.search)}">
  </div>
  <div class="row" style="margin-bottom:12px;gap:8px;">
    <button class="btn green" id="addProductBtn" style="flex:1">+ Add product</button>
    <button class="btn secondary" id="scanProductBtn">📷 Scan</button>
  </div>
  <div class="card" style="padding:4px 10px;">
    ${items.map(p=>`
      <div class="prod-row">
        <div style="flex:1">
          <div class="prod-name">${escapeHtml(p.name)}</div>
          <div class="prod-meta">${p.timesBought?`bought ${p.timesBought}× · last ${p.lastBought||'—'}`:'never bought yet'}${p.barcode?` · #${escapeHtml(p.barcode)}`:''}</div>
        </div>
        <button class="btn small ghost editProdBtn" data-id="${p.id}">Edit</button>
      </div>
    `).join('') || `<div style="padding:20px;text-align:center;color:var(--ink-soft);font-size:13px;">No matches.</div>`}
  </div>`;
}

function renderStores(){
  const backLink = `<button class="link-btn" id="backFromStores">‹ Back</button><br>`;
  if(state.supermarkets.length===0){
    return `
    ${backLink}
    <h2 class="viewtitle">Stores</h2>
    <div class="empty">
      <div class="big">🏬</div>
      <p>Add a supermarket, then build its virtual aisles in the order you actually walk them. Every kart will follow that route automatically.</p>
      <button class="btn green" id="addStoreBtn">+ Add supermarket</button>
    </div>`;
  }
  return `
  ${backLink}
  <h2 class="viewtitle">Stores</h2>
  <button class="btn green block" id="addStoreBtn" style="margin-bottom:14px;">+ Add supermarket</button>
  ${state.supermarkets.map(s=>`
    <div class="store-card" data-id="${s.id}">
      <h4>${escapeHtml(s.name)}</h4>
      <div class="prod-meta">${s.aisles.length} aisle${s.aisles.length!==1?'s':''} mapped</div>
    </div>
  `).join('')}`;
}

function renderStoreDetail(){
  const s = storeById(state.currentStoreId);
  if(!s){ state.currentStoreId=null; return renderStores(); }

  return `
  <button class="link-btn" id="backToStores">‹ All stores</button>
  <h2 class="viewtitle">${escapeHtml(s.name)}</h2>

  <div class="eyebrow">Aisle route (in walking order)</div>
  <div style="margin-bottom:14px;">
    ${s.aisles.map((a,i)=>`
      <div class="aisle-item">
        <div class="aisle-num">${i+1}</div>
        <div style="flex:1;font-size:14px;">${escapeHtml(a.name)}</div>
        <div class="row" style="gap:4px;">
          <div class="arrowbtn" data-act="up" data-aisle="${a.id}">↑</div>
          <div class="arrowbtn" data-act="down" data-aisle="${a.id}">↓</div>
          <div class="arrowbtn" data-act="del" data-aisle="${a.id}">✕</div>
        </div>
      </div>
    `).join('') || `<div class="prod-meta" style="padding:6px 2px 10px;">No aisles yet — add the sections of this store in the order you walk them (e.g. Produce, Bakery, Dairy…).</div>`}
    <button class="btn secondary block" id="addAisleBtn" style="margin-top:6px;">+ Add aisle</button>
  </div>

  <div class="eyebrow">Assign products to aisles</div>
  <div class="card" style="padding:10px;">
    ${s.aisles.length===0 ? `<div style="font-size:13px;color:var(--ink-soft);padding:6px 2px;">Add at least one aisle first.</div>` :
      state.products.length===0 ? `<div style="font-size:13px;color:var(--ink-soft);padding:6px 2px;">Your library is empty — add products first.</div>` :
      state.products.slice().sort((a,b)=>a.name.localeCompare(b.name)).map(p=>`
      <div class="prod-row">
        <div style="flex:1;font-size:13.5px;">${escapeHtml(p.name)}</div>
        <select class="aisleSelect" data-pid="${p.id}" style="width:auto;font-size:12.5px;padding:6px 8px;">
          <option value="">Unsorted</option>
          ${s.aisles.map(a=>`<option value="${a.id}" ${getAisleForProduct(s.id,p.id)===a.id?'selected':''}>${escapeHtml(a.name)}</option>`).join('')}
        </select>
      </div>
    `).join('')}
  </div>
  <div style="height:10px;"></div>
  `;
}

function renderKartTab(){
  if(state.supermarkets.length===0){
    return `
    <h2 class="viewtitle">Kart</h2>
    <div class="empty">
      <div class="big">🧭</div>
      <p>Add a supermarket and its aisles first — that's what lets your kart follow your route. Find it in the menu, top right.</p>
      <button class="btn green" id="goStoresBtn">Set up a store</button>
    </div>`;
  }
  if(state.cart && state.cart.locked){
    return renderShoppingKart();
  }
  return renderPlanningKart();
}

function renderPlanningKart(){
  const storeId = state.planStoreId || state.supermarkets[0].id;
  state.planStoreId = storeId;
  const cartIds = new Set((state.cart && state.cart.supermarketId===storeId) ? state.cart.items.map(i=>i.productId) : []);

  const q = state.search.trim().toLowerCase();
  const visibleProducts = state.products.filter(p=> !q || p.name.toLowerCase().includes(q));
  const groups = groupByAisle(storeId, visibleProducts.map(p=>p.id));

  return `
  <h2 class="viewtitle">Build your kart</h2>
  <div class="field">
    <label>Shopping at</label>
    <select id="planStoreSelect">
      ${state.supermarkets.map(s=>`<option value="${s.id}" ${s.id===storeId?'selected':''}>${escapeHtml(s.name)}</option>`).join('')}
    </select>
  </div>
  <div class="search-wrap">
    <input type="search" id="kartSearch" placeholder="Search your library…" value="${escapeAttr(state.search)}">
  </div>
  <div class="row" style="margin-bottom:10px;">
    <button class="btn secondary small" id="addNewItemBtn">+ New item not in library</button>
  </div>
  ${state.products.length===0 ? `<div class="empty"><p>Your library is empty. Add a product to get started.</p></div>` :
    groups.map(g=>`
    <div class="section-label ${g.unsorted?'unsorted':''}">${escapeHtml(g.label)}</div>
    <div class="section-body">
      ${g.ids.map(pid=>{
        const p = productById(pid);
        const checked = cartIds.has(pid);
        return `
        <div class="prod-row">
          <div class="checkbox ${checked?'checked':''}" data-toggle-need="${pid}">${checked?'✓':''}</div>
          <div style="flex:1">
            <div class="prod-name">${escapeHtml(p.name)}</div>
            <div class="prod-meta">${p.timesBought?`bought ${p.timesBought}×`:'new'}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('')}

  <div style="height:16px;"></div>
  <button class="btn green block" id="lockKartBtn" ${cartIds.size===0?'disabled':''}>
    🔒 Lock kart (${cartIds.size} item${cartIds.size!==1?'s':''})
  </button>
  `;
}

function renderShoppingKart(){
  const store = storeById(state.cart.supermarketId);
  const groups = groupByAisle(state.cart.supermarketId, state.cart.items.map(i=>i.productId));
  const boughtCount = state.cart.items.filter(i=>i.inKart).length;

  return `
  <div class="receipt">
    <div class="receipt-head">
      <div class="store">${escapeHtml(store?store.name:'Kart')}</div>
      <div class="meta">${todayStr()} · ${state.cart.items.length} items ${boughtCount?`· ${boughtCount} in kart`:''}</div>
    </div>
  </div>

  ${groups.map(g=>`
    <div class="section-label ${g.unsorted?'unsorted':''}">${escapeHtml(g.label)}</div>
    <div class="section-body">
      ${g.ids.map(pid=>{
        const p = productById(pid);
        const item = state.cart.items.find(i=>i.productId===pid);
        const got = item.inKart;
        return `
        <div class="prod-row" style="${got?'opacity:0.45;':''}">
          <div class="checkbox ${got?'checked bought':''}" data-toggle-got="${pid}">${got?'✓':''}</div>
          <div style="flex:1">
            <div class="prod-name" style="${got?'text-decoration:line-through;':''}">${escapeHtml(p.name)}</div>
          </div>
          <div class="arrowbtn" data-remove-item="${pid}" title="Remove">✕</div>
        </div>`;
      }).join('')}
    </div>
  `).join('')}

  <div class="row" style="margin:16px 0 10px;gap:8px;">
    <button class="btn secondary" id="addNewItemBtn" style="flex:1;">+ Add item</button>
  </div>
  <button class="btn green block" id="finishKartBtn">✔ Finished shopping</button>
  <button class="btn ghost block" id="unlockKartBtn" style="margin-top:8px;">‹ Back to editing kart</button>
  `;
}

function attachViewHandlers(){
  const addProductBtn = document.getElementById('addProductBtn');
  if(addProductBtn) addProductBtn.onclick = ()=>openProductModal();
  const scanBtn = document.getElementById('scanProductBtn');
  if(scanBtn) scanBtn.onclick = ()=>openProductModal(null,true);
  const libSearch = document.getElementById('librarySearch');
  if(libSearch) libSearch.oninput = (e)=>{ state.search=e.target.value; render(); const el=document.getElementById('librarySearch'); el.focus(); el.selectionStart = el.value.length; };
  document.querySelectorAll('.editProdBtn').forEach(b=> b.onclick = ()=>openProductModal(b.dataset.id));

  const backFromStores = document.getElementById('backFromStores');
  if(backFromStores) backFromStores.onclick = ()=>{ state.currentView = state.previousView || 'library'; state.currentStoreId=null; render(); };
  const addStoreBtn = document.getElementById('addStoreBtn');
  if(addStoreBtn) addStoreBtn.onclick = ()=>openStoreModal();
  document.querySelectorAll('.store-card').forEach(c=> c.onclick = ()=>{ state.currentStoreId=c.dataset.id; render(); });

  const backBtn = document.getElementById('backToStores');
  if(backBtn) backBtn.onclick = ()=>{ state.currentStoreId=null; render(); };
  const addAisleBtn = document.getElementById('addAisleBtn');
  if(addAisleBtn) addAisleBtn.onclick = ()=>openAisleModal();
  document.querySelectorAll('.arrowbtn[data-aisle]').forEach(b=>{
    b.onclick = async ()=>{
      const s = storeById(state.currentStoreId);
      const idx = s.aisles.findIndex(a=>a.id===b.dataset.aisle);
      if(b.dataset.act==='up' && idx>0){ [s.aisles[idx-1],s.aisles[idx]]=[s.aisles[idx],s.aisles[idx-1]]; }
      if(b.dataset.act==='down' && idx<s.aisles.length-1){ [s.aisles[idx+1],s.aisles[idx]]=[s.aisles[idx],s.aisles[idx+1]]; }
      if(b.dataset.act==='del'){
        if(!confirm('Remove this aisle? Products mapped to it become Unsorted.')) return;
        s.aisles.splice(idx,1);
        if(state.aisleMap[s.id]){
          Object.keys(state.aisleMap[s.id]).forEach(pid=>{
            if(state.aisleMap[s.id][pid]===b.dataset.aisle) delete state.aisleMap[s.id][pid];
          });
        }
      }
      await persistAll(); render();
    };
  });
  document.querySelectorAll('.aisleSelect').forEach(sel=>{
    sel.onchange = async ()=>{
      setAisleForProduct(state.currentStoreId, sel.dataset.pid, sel.value||null);
      await persistAll();
    };
  });

  const goStoresBtn = document.getElementById('goStoresBtn');
  if(goStoresBtn) goStoresBtn.onclick = ()=>openStoresMenu();

  const planStoreSelect = document.getElementById('planStoreSelect');
  if(planStoreSelect) planStoreSelect.onchange = (e)=>{ state.planStoreId=e.target.value; render(); };
  const kartSearch = document.getElementById('kartSearch');
  if(kartSearch) kartSearch.oninput = (e)=>{ state.search=e.target.value; render(); const el=document.getElementById('kartSearch'); el.focus(); el.selectionStart = el.value.length; };
  document.querySelectorAll('[data-toggle-need]').forEach(el=>{
    el.onclick = async ()=>{
      const pid = el.dataset.toggleNeed;
      const storeId = state.planStoreId;
      if(!state.cart || state.cart.supermarketId!==storeId || state.cart.locked){
        state.cart = {supermarketId:storeId, locked:false, items:[]};
      }
      const idx = state.cart.items.findIndex(i=>i.productId===pid);
      if(idx>=0) state.cart.items.splice(idx,1);
      else state.cart.items.push({productId:pid, inKart:false});
      await persistAll(); render();
    };
  });
  const lockKartBtn = document.getElementById('lockKartBtn');
  if(lockKartBtn) lockKartBtn.onclick = async ()=>{
    if(!state.cart || state.cart.items.length===0) return;
    state.cart.locked = true;
    await persistAll();
    render();
    toast('Kart locked — happy shopping 🛒');
  };

  document.querySelectorAll('[data-toggle-got]').forEach(el=>{
    el.onclick = async ()=>{
      const pid = el.dataset.toggleGot;
      const item = state.cart.items.find(i=>i.productId===pid);
      item.inKart = !item.inKart;
      await persistAll(); render();
    };
  });
  document.querySelectorAll('[data-remove-item]').forEach(el=>{
    el.onclick = async (ev)=>{
      ev.stopPropagation();
      const pid = el.dataset.removeItem;
      state.cart.items = state.cart.items.filter(i=>i.productId!==pid);
      await persistAll(); render();
    };
  });
  const unlockKartBtn = document.getElementById('unlockKartBtn');
  if(unlockKartBtn) unlockKartBtn.onclick = async ()=>{
    state.cart.locked = false;
    await persistAll();
    render();
  };
  const finishKartBtn = document.getElementById('finishKartBtn');
  if(finishKartBtn) finishKartBtn.onclick = async ()=>{
    const boughtIds = state.cart.items.filter(i=>i.inKart).map(i=>i.productId);
    const missed = state.cart.items.length - boughtIds.length;
    if(missed>0){
      if(!confirm(`${missed} item(s) aren't checked as bought. Finish anyway and clear the kart?`)) return;
    }
    const stamp = new Date().toLocaleDateString();
    boughtIds.forEach(pid=>{
      const p = productById(pid);
      if(p){ p.timesBought = (p.timesBought||0)+1; p.lastBought = stamp; }
    });
    state.cart = null;
    await persistAll();
    render();
    toast('Nice work — kart cleared 🎉');
  };

  const addNewItemBtn = document.getElementById('addNewItemBtn');
  if(addNewItemBtn) addNewItemBtn.onclick = ()=>openProductModal(null,false,true);
}

function closeModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML='';
}

function openProductModal(existingId, startScan, addToCurrentList){
  const p = existingId ? productById(existingId) : null;
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>${p? 'Edit product':'Add product'}</h3>
      <div class="field">
        <label>Name</label>
        <input type="text" id="mName" placeholder="e.g. Olive oil" value="${p?escapeAttr(p.name):''}">
      </div>
      <div class="field">
        <label>Barcode (optional)</label>
        <div class="row">
          <input type="text" id="mBarcode" placeholder="Scan or type…" value="${p?escapeAttr(p.barcode||''):''}" style="flex:1">
          <button class="btn secondary" id="mScanBtn">📷</button>
        </div>
      </div>
      <div id="scanBox" style="display:none;margin-bottom:10px;">
        <video id="scanVideo" muted playsinline></video>
        <div style="font-size:11px;color:var(--ink-soft);margin-top:4px;">Point at a barcode. <button class="link-btn" id="stopScanBtn" style="margin-bottom:0;">Cancel scan</button></div>
      </div>
      <div class="row" style="margin-top:16px;gap:8px;">
        ${p?`<button class="btn red" id="mDeleteBtn">Delete</button>`:''}
        <button class="btn secondary" id="mCancelBtn" style="flex:1">Cancel</button>
        <button class="btn green" id="mSaveBtn" style="flex:1">Save</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalBg').onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('mCancelBtn').onclick = ()=>{ stopScan(); closeModal(); };
  document.getElementById('mScanBtn').onclick = ()=> startScan_();
  if(p) document.getElementById('mDeleteBtn').onclick = async ()=>{
    if(!confirm(`Delete "${p.name}" from your library? This also removes it from all stores and any active kart.`)) return;
    state.products = state.products.filter(x=>x.id!==p.id);
    Object.keys(state.aisleMap).forEach(sid=> delete state.aisleMap[sid][p.id]);
    if(state.cart) state.cart.items = state.cart.items.filter(i=>i.productId!==p.id);
    await persistAll(); closeModal(); render();
  };
  document.getElementById('mSaveBtn').onclick = async ()=>{
    const name = document.getElementById('mName').value.trim();
    const barcode = document.getElementById('mBarcode').value.trim();
    if(!name){ toast('Give it a name first'); return; }
    stopScan();
    if(p){
      p.name = name; p.barcode = barcode;
    } else {
      const np = {id:uid(), name, barcode, timesBought:0, lastBought:null, createdAt:Date.now()};
      state.products.push(np);
      if(addToCurrentList && state.cart){
        state.cart.items.push({productId:np.id, inKart:false});
      }
    }
    await persistAll();
    closeModal();
    render();
  };
  if(startScan) setTimeout(startScan_, 50);

  function startScan_(){
    const box = document.getElementById('scanBox');
    box.style.display='block';
    if(typeof Quagga === 'undefined'){
      toast('Scanner unavailable — enter the barcode manually');
      box.style.display='none';
      return;
    }
    try{
      Quagga.init({
        inputStream:{ type:'LiveStream', target: document.getElementById('scanVideo'), constraints:{ facingMode:'environment' } },
        decoder:{ readers:['ean_reader','upc_reader','ean_8_reader','upc_e_reader'] }
      }, function(err){
        if(err){ toast('Camera unavailable — enter barcode manually'); box.style.display='none'; return; }
        Quagga.start();
      });
      Quagga.onDetected(onDetected);
    }catch(e){ toast('Camera unavailable — enter barcode manually'); box.style.display='none'; }
  }
  function onDetected(res){
    const code = res && res.codeResult && res.codeResult.code;
    if(code){
      document.getElementById('mBarcode').value = code;
      stopScan();
      toast('Barcode captured: '+code);
    }
  }
  function stopScan(){
    const box = document.getElementById('scanBox');
    if(box) box.style.display='none';
    try{ Quagga.offDetected(onDetected); Quagga.stop(); }catch(e){}
  }
}

function openStoreModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>Add supermarket</h3>
      <div class="field">
        <label>Name</label>
        <input type="text" id="sName" placeholder="e.g. Whole Foods — Main St">
      </div>
      <div class="row" style="margin-top:16px;gap:8px;">
        <button class="btn secondary" id="sCancelBtn" style="flex:1">Cancel</button>
        <button class="btn green" id="sSaveBtn" style="flex:1">Save</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalBg').onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('sCancelBtn').onclick = closeModal;
  document.getElementById('sSaveBtn').onclick = async ()=>{
    const name = document.getElementById('sName').value.trim();
    if(!name){ toast('Give the store a name'); return; }
    const s = {id:uid(), name, aisles:[]};
    state.supermarkets.push(s);
    await persistAll();
    closeModal();
    state.currentStoreId = s.id;
    render();
  };
}

function openAisleModal(){
  const root = document.getElementById('modalRoot');
  root.innerHTML = `
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <h3>Add aisle / section</h3>
      <div class="field">
        <label>Name</label>
        <input type="text" id="aName" placeholder="e.g. Produce, Dairy, Frozen…">
      </div>
      <div style="font-size:11.5px;color:var(--ink-soft);margin-bottom:10px;">It's added to the end of the route — reorder anytime with the arrows.</div>
      <div class="row" style="gap:8px;">
        <button class="btn secondary" id="aCancelBtn" style="flex:1">Cancel</button>
        <button class="btn green" id="aSaveBtn" style="flex:1">Add</button>
      </div>
    </div>
  </div>`;
  document.getElementById('modalBg').onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };
  document.getElementById('aCancelBtn').onclick = closeModal;
  document.getElementById('aSaveBtn').onclick = async ()=>{
    const name = document.getElementById('aName').value.trim();
    if(!name){ toast('Name the aisle first'); return; }
    const s = storeById(state.currentStoreId);
    s.aisles.push({id:uid(), name});
    await persistAll();
    closeModal();
    render();
  };
}

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

init();
})();
</script>
</body>
</html>
